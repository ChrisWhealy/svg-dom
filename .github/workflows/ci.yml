name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-test:
    name: fmt · clippy · test · doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy (library + tests)
        run: cargo clippy --lib --tests -- -D warnings

      - name: Clippy (demo feature)
        run: cargo clippy --lib --features demo -- -D warnings

      - name: Unit tests + doctests
        run: cargo test --all-features

      - name: Docs (deny warnings)
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  wasm:
    name: wasm build · README example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Build demo for wasm32
        run: cargo build --features demo --target wasm32-unknown-unknown

      - name: Compile README minimal demo for wasm32
        run: cargo build --example readme_minimal --target wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: wasm-pack build (the published web artifact)
        # `--features` is passed after `--` so it reaches cargo directly. Older wasm-pack versions
        # (such as the one the action may install) don't accept `--features` as a wasm-pack flag.
        run: wasm-pack build --target web -- --features demo

  browser-tests:
    name: wasm-pack test (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      # Don't let one engine failing cancel the other — we want to see which broke.
      fail-fast: false
      matrix:
        # The two distinct engines available on Linux runners: Gecko (Firefox) and Blink
        # (Chrome — also covers Edge and most mobile webviews). WebKit/Safari needs a macOS
        # runner and lacks reliable headless support, so it is intentionally omitted.
        browser: [firefox, chrome]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
      - name: Run the browser integration tests
        run: wasm-pack test --headless --${{ matrix.browser }}

  coverage:
    name: coverage (host tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - uses: Swatinem/rust-cache@v2

      # llvm-cov instruments the host-runnable tests only (the `error` and demo
      # `highlight` modules). The DOM-bound `root`/`node`/`animate` code is
      # exercised by the wasm-pack browser tests in the `browser-tests` job,
      # which cannot be instrumented here — so this figure reflects the
      # host-testable subset of the crate, not the whole library.
      - name: Measure coverage (host-runnable tests)
        run: cargo llvm-cov nextest --all-features --no-report

      - name: Emit lcov report
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Coverage summary (job log)
        run: cargo llvm-cov report

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info

  deny:
    name: cargo-deny (advisories · licenses · bans · sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Check advisories, bans, licenses, and sources
        run: cargo deny check advisories bans licenses sources

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check the library builds on the declared MSRV
        run: cargo check --lib --target wasm32-unknown-unknown
