name: Security audit

# The `deny` job in ci.yml runs the full cargo-deny policy on every push/PR, but
# that only catches advisories that exist at commit time. New RUSTSEC advisories
# are disclosed against *unchanged* dependencies all the time, so this workflow
# re-runs the advisory check on a schedule (and whenever the dependency set or
# the policy itself changes) to surface them without waiting for the next commit.

on:
  schedule:
    # Every Monday at 07:00 UTC.
    - cron: "0 7 * * 1"
  push:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  workflow_dispatch:

jobs:
  advisories:
    name: cargo-deny advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories
